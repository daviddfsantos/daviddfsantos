<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatium Rimor</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #232526, #414345);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 1.5em;
    }

    .btn {
      padding: 12px 24px;
      background-color: #00bcd4;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1em;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #0097a7;
    }
  </style>
</head>
<body>
  <h1>Bem-vindo ao Spatium Rimor</h1>
  <p>Explore o espaço do conhecimento com a Mari 🌌</p>
  <button class="btn" onclick="window.location.href='https://example.com'">Entrar</button>
</body>
</html>
